receivers:

  otlp:
    protocols:
      grpc:
      http:

processors:

  batch:

exporters:

  otlp/tempo:
    endpoint: tempo:4317

    tls:
      insecure: true

  debug:
    verbosity: detailed

service:

  pipelines:

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]