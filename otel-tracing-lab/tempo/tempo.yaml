auth_enabled: false

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
        http:

storage:
  trace:
    backend: local

    local:
      path: /tmp/tempo/traces

    wal:
      path: /tmp/tempo/wal

compactor:
  compaction:
    block_retention: 24h

overrides:
  defaults:
    metrics_generator:
      processors: []